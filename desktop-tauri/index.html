<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeChat</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 15px/1.5 system-ui, sans-serif;
        background: #0f1117;
        color: #e8ecf5;
      }
      .card {
        width: min(420px, 92vw);
        padding: 28px;
        border-radius: 14px;
        border: 1px solid #2a3142;
        background: #171a22;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0 0 12px; color: #8b93a7; }
      code {
        display: block;
        padding: 10px 12px;
        border-radius: 8px;
        background: #1e2330;
        color: #c7d2fe;
        word-break: break-all;
      }
      a {
        display: inline-block;
        margin-top: 14px;
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <!-- 正常启动会直接打开 Tinode Web；此页仅作服务未就绪时的兜底 -->
    <div class="card">
      <h1>VibeChat</h1>
      <p>正在连接本地 Tinode… 若长时间停留，请先启动服务端：</p>
      <code>cd /home/hkm/projects/teleg && sudo docker compose up -d</code>
      <a href="http://localhost:6060/">打开 http://localhost:6060/</a>
    </div>
    <script>
      // 服务就绪后自动跳转
      const target = "http://localhost:6060/";
      async function probe() {
        try {
          await fetch(target, { mode: "no-cors", cache: "no-store" });
          location.replace(target);
        } catch (_) {
          setTimeout(probe, 1500);
        }
      }
      probe();
    </script>
  </body>
</html>
