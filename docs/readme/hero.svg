<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">VibeChat</title>
  <desc id="desc">VibeChat 的项目标题图，展示自托管 Tinode 通信栈、79 个 AI 角色 NPC 与 Web、Tauri、Qt 客户端。</desc>
  <rect width="1200" height="390" rx="24" fill="#10172b"/>
  <rect x="1" y="1" width="1198" height="388" rx="23" fill="none" stroke="#2f3b60"/>
  <g id="title-block" transform="translate(64 58)">
    <rect width="138" height="32" rx="16" fill="#252e64"/>
    <circle cx="20" cy="16" r="5" fill="#ffdc6e"/>
    <text x="36" y="22" fill="#c9ceff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">SELF-HOSTED IM</text>
    <text x="0" y="104" fill="#f6f7ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="66" font-weight="700">VibeChat</text>
    <text x="2" y="145" fill="#d3d8ee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="25">自己的即时通信服务，配有 79 个 AI 角色 NPC。</text>
    <text x="2" y="182" fill="#98a4c5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="21">Docker 部署 · Tinode 消息服务 · Web / Tauri / Qt 客户端</text>
    <path d="M2 230H498" stroke="#334063" stroke-width="2"/>
    <text x="2" y="270" fill="#dce1f7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">MYSQL + TINODE</text>
    <text x="213" y="270" fill="#ffdc6e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">AI NPC × 79</text>
  </g>
  <g id="architecture-proof" transform="translate(700 45)">
    <rect width="432" height="300" rx="18" fill="#171f37" stroke="#3a476d"/>
    <text x="28" y="38" fill="#aeb8d8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">YOUR CHAT STACK</text>
    <g id="client-row" transform="translate(26 60)">
      <rect width="112" height="47" rx="10" fill="#252f54"/>
      <text x="56" y="29" text-anchor="middle" fill="#f4f5ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="600">Web</text>
      <rect x="136" width="112" height="47" rx="10" fill="#252f54"/>
      <text x="192" y="29" text-anchor="middle" fill="#f4f5ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="600">Tauri</text>
      <rect x="246" width="112" height="47" rx="10" fill="#252f54"/>
      <text x="302" y="29" text-anchor="middle" fill="#f4f5ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="600">Qt</text>
    </g>
    <path d="M82 118V137M192 118V137M302 118V137M82 137H302" fill="none" stroke="#7180be" stroke-width="2"/>
    <g id="tinode-service" transform="translate(109 145)">
      <rect width="214" height="54" rx="12" fill="#6973e6"/>
      <circle cx="28" cy="27" r="8" fill="#ffdc6e"/>
      <text x="48" y="33" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="700">Tinode 服务</text>
    </g>
    <path d="M154 212H278M216 199V212" fill="none" stroke="#7180be" stroke-width="2"/>
    <g id="mysql-service" transform="translate(28 222)">
      <rect width="166" height="50" rx="11" fill="#242e52"/>
      <text x="83" y="31" text-anchor="middle" fill="#d9def5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="19" font-weight="600">MySQL</text>
    </g>
    <g id="npc-service" transform="translate(238 222)">
      <rect width="166" height="50" rx="11" fill="#3d3567"/>
      <circle cx="24" cy="25" r="6" fill="#ffdc6e"/>
      <text x="39" y="31" fill="#e8e2ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="19" font-weight="600">NPC × 79</text>
    </g>
  </g>
</svg>
