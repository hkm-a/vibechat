# VibeChat Desktop — CI 矩阵构建
# 每个平台只跑自己原生编译，不交叉编译。
# 触发: push / PR 到 main/master
# 产出: 各平台安装包上传到 Actions Artifacts

name: Build VibeChat Desktop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: deb
            artifact: VibeChat-x86_64-linux.deb

          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
            artifact: VibeChat-x86_64-macos.dmg

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: exe
            artifact: VibeChat-x86_64-windows.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: |
          # Tauri on macOS needs no extra apt; brew deps optional
          which cargo

      - name: Generate frontend dist
        run: |
          mkdir -p dist
          cp index.html dist/index.html

      - name: npm install
        run: npm install

      - name: Build Tauri (release)
        run: npm run build
        env:
          # Specta / Tauri 有时会读 CI 环境变量
          CI: true

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn